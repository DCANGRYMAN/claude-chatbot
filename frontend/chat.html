<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Assistente IA Pro — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --surface3: #22222f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --accent: #7c6aff;
    --accent2: #ff6a9e;
    --accent-glow: rgba(124,106,255,0.25);
    --text: #f0f0f8;
    --muted: #6b6b85;
    --muted2: #4a4a62;
    --success: #4affa0;
    --user-bubble: #1e1e30;
    --bot-bubble: #16161f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh; display: flex; overflow: hidden;
  }

  /* ──────────────── SIDEBAR ──────────────── */
  .sidebar {
    width: 260px; flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 24px 16px;
    position: relative; z-index: 10;
  }
  .logo {
    display: flex; align-items: center; gap: 9px; margin-bottom: 32px; padding: 0 4px;
  }
  .logo-icon {
    width: 34px; height: 34px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; box-shadow: 0 0 16px var(--accent-glow); flex-shrink: 0;
  }
  .logo-text { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }
  .logo-text span { color: var(--accent); }

  .sidebar-section-title {
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted2); font-weight: 600; padding: 0 8px; margin-bottom: 8px;
  }

  /* Ações rápidas */
  .quick-actions { margin-bottom: 28px; display: flex; flex-direction: column; gap: 4px; }
  .qa-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px;
    background: transparent; border: none; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    cursor: pointer; text-align: left; transition: all 0.15s; width: 100%;
  }
  .qa-btn:hover { background: var(--surface2); color: var(--text); }
  .qa-btn .qa-icon { font-size: 15px; width: 20px; text-align: center; }

  /* Perfil */
  .sidebar-bottom { margin-top: auto; }
  .perfil-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; margin-bottom: 8px;
  }
  .perfil-nome { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .perfil-cargo {
    font-size: 11px; color: var(--accent); letter-spacing: 0.05em; text-transform: uppercase; font-weight: 500;
  }
  .btn-reset {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; padding: 9px; border-radius: 10px;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-reset:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ──────────────── MAIN CHAT ──────────────── */
  .main {
    flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative;
  }

  /* Header */
  .chat-header {
    padding: 20px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .chat-header-info {}
  .chat-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
  .chat-subtitle { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .status-dot {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--success);
  }
  .status-dot::before {
    content: ''; width: 7px; height: 7px; border-radius: 50%;
    background: var(--success); box-shadow: 0 0 6px var(--success);
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Messages area */
  .messages {
    flex: 1; overflow-y: auto; padding: 28px;
    display: flex; flex-direction: column; gap: 20px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 2px; }

  /* Empty state */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex: 1; text-align: center; padding: 40px;
    animation: fadeIn 0.5s ease;
  }
  .empty-icon {
    width: 60px; height: 60px; border-radius: 18px;
    background: linear-gradient(135deg, rgba(124,106,255,0.2), rgba(255,106,158,0.2));
    border: 1px solid rgba(124,106,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; margin-bottom: 20px;
  }
  .empty-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .empty-sub { color: var(--muted); font-size: 14px; max-width: 340px; line-height: 1.6; margin-bottom: 28px; }
  .suggestions { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 400px; }
  .suggestion {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
    text-align: left; cursor: pointer; transition: all 0.2s;
    font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 10px;
  }
  .suggestion:hover { border-color: var(--accent); color: var(--text); background: rgba(124,106,255,0.08); }
  .suggestion-icon { font-size: 16px; }

  /* Mensagens */
  .msg { display: flex; gap: 12px; animation: msgIn 0.3s ease; max-width: 100%; }
  @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
  }
  .msg.bot .msg-avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 12px var(--accent-glow);
  }
  .msg.user .msg-avatar {
    background: var(--surface3); border: 1px solid var(--border2);
    font-family: 'Syne', sans-serif; font-size: 13px;
  }
  .msg-content { flex: 1; max-width: calc(100% - 46px); }
  .msg-bubble {
    padding: 14px 18px; border-radius: 16px;
    font-size: 14px; line-height: 1.7;
    white-space: pre-wrap; word-wrap: break-word;
  }
  .msg.bot .msg-bubble {
    background: var(--bot-bubble); border: 1px solid var(--border);
    border-top-left-radius: 4px; color: var(--text);
  }
  .msg.user .msg-bubble {
    background: var(--user-bubble); border: 1px solid var(--border2);
    border-top-right-radius: 4px; color: var(--text);
  }
  .msg-time { font-size: 11px; color: var(--muted2); margin-top: 5px; padding: 0 4px; }
  .msg.user .msg-time { text-align: right; }

  /* Copy button */
  .msg-actions { display: flex; gap: 6px; margin-top: 6px; }
  .msg-action-btn {
    background: transparent; border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted); padding: 3px 8px;
    font-size: 11px; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  }
  .msg-action-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Typing indicator */
  .typing { display: none; align-items: center; gap: 12px; padding: 0 0 4px; }
  .typing.visible { display: flex; }
  .typing-dots { display: flex; gap: 4px; padding: 12px 16px; background: var(--bot-bubble); border: 1px solid var(--border); border-radius: 12px; border-top-left-radius: 4px; }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); animation: bounce 1.2s ease infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  /* ──────────────── INPUT AREA ──────────────── */
  .input-area {
    border-top: 1px solid var(--border);
    padding: 20px 28px;
    flex-shrink: 0;
  }
  .input-wrap {
    display: flex; align-items: flex-end; gap: 12px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 16px; padding: 12px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  #chat-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; line-height: 1.6; resize: none;
    max-height: 120px; min-height: 24px;
  }
  #chat-input::placeholder { color: var(--muted); }
  .send-btn {
    width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), #9b6aff);
    border: none; color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; transition: all 0.2s;
    box-shadow: 0 2px 10px var(--accent-glow);
  }
  .send-btn:hover { transform: scale(1.05); }
  .send-btn:active { transform: scale(0.97); }
  .input-hint { font-size: 11px; color: var(--muted2); margin-top: 8px; text-align: center; }
  .input-hint kbd {
    background: var(--surface3); border: 1px solid var(--border);
    border-radius: 3px; padding: 1px 4px; font-size: 10px;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <div class="logo-icon">✦</div>
    <div class="logo-text">Assistente<span>IA</span></div>
  </div>

  <div class="sidebar-section-title">Ações Rápidas</div>
  <div class="quick-actions">
    <button class="qa-btn" onclick="atalho('Escreva um e-mail profissional para mim')">
      <span class="qa-icon">✉️</span> Escrever e-mail
    </button>
    <button class="qa-btn" onclick="atalho('Crie um relatório de status semanal')">
      <span class="qa-icon">📄</span> Relatório semanal
    </button>
    <button class="qa-btn" onclick="atalho('Escreva uma ata de reunião para mim')">
      <span class="qa-icon">📝</span> Ata de reunião
    </button>
    <button class="qa-btn" onclick="atalho('Sugira automações para minha rotina de trabalho')">
      <span class="qa-icon">⚡</span> Sugerir automações
    </button>
    <button class="qa-btn" onclick="atalho('Resuma o seguinte texto para mim:')">
      <span class="qa-icon">🗜️</span> Resumir texto
    </button>
    <button class="qa-btn" onclick="atalho('Crie um checklist de tarefas para minha semana')">
      <span class="qa-icon">✅</span> Checklist semanal
    </button>
  </div>

  <div class="sidebar-bottom">
    <div class="perfil-card">
      <div class="perfil-nome" id="sidebar-nome">Carregando...</div>
      <div class="perfil-cargo" id="sidebar-cargo">—</div>
    </div>
    <button class="btn-reset" onclick="resetarChat()">🔄 Limpar conversa</button>
    <button class="btn-reset" style="margin-top:6px; color: var(--accent2);" onclick="reconfigurar()">⚙️ Reconfigurar perfil</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="chat-header">
    <div class="chat-header-info">
      <div class="chat-title" id="header-titulo">Seu Assistente</div>
      <div class="chat-subtitle">Personalizado para sua rotina de trabalho</div>
    </div>
    <div class="status-dot">Online</div>
  </div>

  <div class="messages" id="messages">
    <!-- Empty state inicial -->
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">✦</div>
      <div class="empty-title" id="empty-titulo">Olá! Como posso ajudar?</div>
      <div class="empty-sub">Estou pronto para redigir e-mails, criar relatórios e automatizar suas tarefas. O que você precisa hoje?</div>
      <div class="suggestions" id="sugestoes">
        <!-- preenchido via JS baseado no cargo -->
      </div>
    </div>
  </div>

  <!-- Typing -->
  <div style="padding: 0 28px 4px; display:none;" id="typing-wrap">
    <div class="typing visible">
      <div style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;">✦</div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="chat-input" placeholder="Digite sua tarefa ou pergunta..." rows="1"
        oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="enviar()">➤</button>
    </div>
    <div class="input-hint"><kbd>Enter</kbd> para enviar · <kbd>Shift+Enter</kbd> para nova linha</div>
  </div>
</div>

<script>
const API = '/api/chat';
const userId = localStorage.getItem('user_id');
const userName = localStorage.getItem('user_nome');
const cargoTipo = localStorage.getItem('cargo_tipo');
const respostas = JSON.parse(localStorage.getItem('respostas') || '{}');
const historicoKey = 'historico';
let historico = [];
try {
  historico = JSON.parse(localStorage.getItem(historicoKey) || '[]');
} catch (err) {
  historico = [];
}
if (!Array.isArray(historico)) {
  historico = [];
}

if (!userId || !userName || !cargoTipo || !localStorage.getItem('onboarding_done')) {
  window.location.href = 'index.html';
}

// Inicializa UI
document.getElementById('sidebar-nome').textContent = userName;
document.getElementById('header-titulo').textContent = `${saudacao()}, ${userName}`;
document.getElementById('empty-titulo').textContent = `${saudacao()}, ${userName}! 👋`;

// Saudação baseada em horário
function saudacao() {
  const h = new Date().getHours();
  if (h < 12) return 'Bom dia';
  if (h < 18) return 'Boa tarde';
  return 'Boa noite';
}

// Sugestões por cargo
const SUGESTOES = {
  tecnologia: [
    { icon: '🎫', texto: 'Escreva um ticket detalhado para esse bug: [descreva aqui]' },
    { icon: '📬', texto: 'Escreva um e-mail de atualização de sprint para meu time' },
    { icon: '🗒️', texto: 'Crie documentação para essa função de código: [cole aqui]' },
  ],
  administracao: [
    { icon: '📊', texto: 'Crie um relatório executivo de desempenho do mês' },
    { icon: '✉️', texto: 'Escreva um e-mail formal para fornecedor solicitando proposta' },
    { icon: '📋', texto: 'Crie uma pauta para reunião de alinhamento de equipe' },
  ],
  marketing: [
    { icon: '📣', texto: 'Crie 5 ideias de post para LinkedIn sobre nosso produto' },
    { icon: '✉️', texto: 'Escreva um e-mail de nutrição para leads no fundo do funil' },
    { icon: '📈', texto: 'Escreva um relatório de performance de campanha' },
  ],
  geral: [
    { icon: '✉️', texto: 'Escreva um e-mail profissional para meu gestor' },
    { icon: '📄', texto: 'Crie um relatório de atividades da semana' },
    { icon: '📝', texto: 'Escreva uma ata da última reunião de equipe' },
  ]
};

function carregarSugestoes() {
  const cargo = localStorage.getItem('cargo_tipo') || 'geral';
  const sugs = SUGESTOES[cargo] || SUGESTOES.geral;
  const container = document.getElementById('sugestoes');
  container.innerHTML = sugs.map(s => `
    <div class="suggestion" onclick="atalho('${s.texto.replace(/'/g,"\\'")}')">
      <span class="suggestion-icon">${s.icon}</span>
      <span>${s.texto}</span>
    </div>
  `).join('');
  document.getElementById('sidebar-cargo').textContent = cargo.charAt(0).toUpperCase() + cargo.slice(1);
}
carregarSugestoes();
renderHistorico();

function persistHistorico() {
  localStorage.setItem(historicoKey, JSON.stringify(historico));
}

function renderMensagem(item) {
  const tipo = item.role === 'assistant' ? 'bot' : 'user';
  const msgs = document.getElementById('messages');
  const inicial = userName.charAt(0).toUpperCase();
  const div = document.createElement('div');
  div.className = `msg ${tipo}`;
  div.innerHTML = `
    <div class="msg-avatar">${tipo === 'bot' ? '✦' : inicial}</div>
    <div class="msg-content">
      <div class="msg-bubble">${item.content}</div>
      <div class="msg-time">${agora()}</div>
      ${tipo === 'bot' ? `<div class="msg-actions"><button class="msg-action-btn" onclick="copiar(this, \`${item.content.replace(/`/g,'\\`')}\`)">📋 Copiar</button></div>` : ''}
    </div>
  `;
  msgs.appendChild(div);
}

function renderHistorico() {
  const msgs = document.getElementById('messages');
  if (!historico.length) return;
  msgs.innerHTML = '';
  historico.forEach(renderMensagem);
  scrollDown();
}

// ── Helpers ──
function agora() {
  return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function scrollDown() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function esconderEmpty() {
  const e = document.getElementById('empty-state');
  if (e) e.remove();
}

function adicionarMsg(tipo, texto) {
  esconderEmpty();
  const mensagem = { role: tipo === 'bot' ? 'assistant' : 'user', content: texto };
  historico.push(mensagem);
  persistHistorico();
  renderMensagem(mensagem);
  scrollDown();
}

function copiar(btn, texto) {
  navigator.clipboard.writeText(texto).then(() => {
    btn.textContent = '✓ Copiado!';
    setTimeout(() => btn.textContent = '📋 Copiar', 2000);
  });
}

function mostrarTyping(v) {
  document.getElementById('typing-wrap').style.display = v ? 'block' : 'none';
  if (v) scrollDown();
}

async function enviar() {
  const input = document.getElementById('chat-input');
  const texto = input.value.trim();
  if (!texto) return;

  input.value = ''; input.style.height = 'auto';
  adicionarMsg('user', texto);
  mostrarTyping(true);

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nome: userName,
        cargo_tipo: cargoTipo,
        respostas,
        historico,
      }),
    });
    const data = await res.json();
    mostrarTyping(false);
    if (!res.ok) {
      throw new Error(data.detail || data.error || 'Erro na API');
    }
    adicionarMsg('bot', data.resposta || 'Erro na resposta.');
  } catch (err) {
    mostrarTyping(false);
    adicionarMsg('bot', '⚠️ Não consegui conectar ao servidor. Verifique a API em /api/chat.');
  }
}

function atalho(texto) {
  const input = document.getElementById('chat-input');
  input.value = texto;
  input.focus();
  autoResize(input);
}

function resetarChat() {
  if (!confirm('Limpar o histórico da conversa?')) return;
  localStorage.removeItem(historicoKey);
  historico.length = 0;
  document.getElementById('messages').innerHTML = `
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">✦</div>
      <div class="empty-title">Conversa reiniciada</div>
      <div class="empty-sub">Histórico limpo. Como posso te ajudar agora?</div>
      <div class="suggestions" id="sugestoes"></div>
    </div>`;
  carregarSugestoes();
}

function reconfigurar() {
  if (!confirm('Isso vai apagar seu perfil atual e você precisará refazer o onboarding. Continuar?')) return;
  localStorage.clear();
  window.location.href = 'index.html';
}

// Enter para enviar
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    enviar();
  }
});
</script>
</body>
</html>
